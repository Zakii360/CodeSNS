<!DOCTYPE html>
<html>
<head>
<title>CodeSNS</title>

<style>
body{
  margin:0;
  font-family: system-ui, -apple-system, Arial;
  background:#0b0f14;
  color:#e6edf3;
}

/* layout */
.layout{
  display:grid;
  grid-template-columns: 240px 600px 320px;
  justify-content:center;
  gap:20px;
}

/* left */
.left{
  padding:16px;
  position:sticky;
  top:0;
  height:100vh;
}

.logo{
  font-size:20px;
  font-weight:700;
  margin-bottom:20px;
}

/* center */
.center{
  border-left:1px solid #1f2a37;
  border-right:1px solid #1f2a37;
  min-height:100vh;
}

/* right */
.right{
  padding:16px;
}

/* cards */
.card{
  background:#0f1620;
  border:1px solid #1f2a37;
  border-radius:14px;
  padding:12px;
  margin:10px;
  transition:0.15s;
}

.card:hover{
  border-color:#2b3b52;
}

/* post */
.post-header{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:8px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
}

.name{
  font-weight:700;
}

.handle{
  color:#7aa2ff;
  font-size:12px;
}

textarea,input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #2a3a4d;
  background:#0b111a;
  color:white;
  margin-bottom:8px;
}

button{
  background:#1d4ed8;
  border:none;
  padding:8px 12px;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

.tabbar{
  display:flex;
  border-bottom:1px solid #1f2a37;
}

.tab{
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
}

.tab.active{
  border-bottom:2px solid #1d4ed8;
  font-weight:600;
}
</style>

</head>

<body>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const sb = supabase.createClient(
  "https://ypkylqncvulitdfvndsy.supabase.co",
  "PASTE_ANON_KEY"
);

/* ======================
   USER SYSTEM (NO AUTH)
====================== */

async function createUser(){
  const username = prompt("Choose username (@handle)");
  const display = prompt("Display name");

  const { data } = await sb.from("sns_profiles").insert({
    username,
    display_name: display,
    avatar_url: "https://api.dicebear.com/7.x/bottts/svg?seed="+username
  }).select().single();

  localStorage.setItem("uid", data.id);
  return data;
}

async function getUser(){
  const id = localStorage.getItem("uid");
  if(!id) return null;

  const { data } = await sb
    .from("sns_profiles")
    .select("*")
    .eq("id",id)
    .single();

  return data;
}

/* ======================
   POSTS
====================== */

async function loadFeed(tab="for_you"){
  const user = await getUser();

  let query = sb
    .from("sns_posts")
    .select("*, sns_profiles(username, display_name, avatar_url)")
    .order("created_at",{ascending:false});

  const { data } = await query;

  render(user, data);
}

async function post(){
  const user = await getUser();
  const txt = document.getElementById("postbox").value;

  await sb.from("sns_posts").insert({
    user_id:user.id,
    content:txt
  });

  loadFeed();
}

/* ======================
   FOLLOW
====================== */

async function follow(targetId){
  const user = await getUser();

  await sb.from("sns_follows").insert({
    follower_id:user.id,
    following_id:targetId
  });
}

/* ======================
   LIKE
====================== */

async function like(postId){
  const user = await getUser();

  await sb.from("sns_likes").insert({
    user_id:user.id,
    post_id:postId
  });
}

/* ======================
   UI RENDER
====================== */

function render(user, posts){
  document.getElementById("app").innerHTML = `
  <div class="layout">

    <!-- LEFT -->
    <div class="left">
      <div class="logo">🐦 CodeSNS</div>
      <p>Home</p>
      <p>Explore</p>
      <p>Profile</p>
    </div>

    <!-- CENTER -->
    <div class="center">

      <div class="tabbar">
        <div class="tab active">For You</div>
        <div class="tab">Following</div>
      </div>

      <div class="card">
        <textarea id="postbox" placeholder="What’s happening?"></textarea>
        <button onclick="post()">Post</button>
      </div>

      ${posts.map(p=>`
        <div class="card">

          <div class="post-header">
            <img class="avatar" src="${p.sns_profiles.avatar_url}">
            <div>
              <div class="name">${p.sns_profiles.display_name}</div>
              <div class="handle">@${p.sns_profiles.username}</div>
            </div>
          </div>

          <p>${p.content}</p>

          <button onclick="like('${p.id}')">Like</button>
          <button onclick="follow('${p.user_id}')">Follow</button>

        </div>
      `).join("")}

    </div>

    <!-- RIGHT -->
    <div class="right">

      <div class="card">
        <h3>Trends</h3>
        <p>#devbuilds</p>
        <p>#supabaseapps</p>
        <p>#indiedev</p>
      </div>

      <div class="card">
        <h3>Who to follow</h3>
        <p>Suggested devs coming soon</p>
      </div>

    </div>

  </div>
  `;
}

/* ======================
   INIT
====================== */

async function init(){
  let user = await getUser();

  if(!user){
    user = await createUser();
  }

  loadFeed();
}

init();
</script>

</body>
</html>
