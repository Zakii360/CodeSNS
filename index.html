<!DOCTYPE html>
<html>
<head>
<title>CodeSNS</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f14;
  color:#e6edf3;
}

.layout{
  display:grid;
  grid-template-columns:240px 600px 320px;
  justify-content:center;
}

.left,.right{
  padding:16px;
  position:sticky;
  top:0;
  height:100vh;
}

.center{
  border-left:1px solid #1f2a37;
  border-right:1px solid #1f2a37;
  min-height:100vh;
}

.logo{
  font-size:20px;
  font-weight:800;
  margin-bottom:20px;
}

.card{
  background:#0f1620;
  border:1px solid #1f2a37;
  border-radius:14px;
  padding:12px;
  margin:10px;
}

.post-header{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
}

.name{font-weight:700;}
.handle{color:#7aa2ff;font-size:12px;}

textarea,input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #2a3a4d;
  background:#0b111a;
  color:white;
  margin-bottom:8px;
}

button{
  background:#1d4ed8;
  border:none;
  padding:8px 12px;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

button:hover{background:#2563eb;}

/* onboarding */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-box{
  width:340px;
  background:#0f1620;
  border:1px solid #1f2a37;
  padding:16px;
  border-radius:14px;
}
</style>

</head>

<body>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const sb = supabase.createClient(
  "https://ypkylqncvulitdfvndsy.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwa3lscW5jdnVsaXRkZnZuZHN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1ODIyMzcsImV4cCI6MjA5ODE1ODIzN30.ChFkLwx4Q_pA7c_Muy2kMHK8DB4LrPjfLUosgJsWGt8"
);

/* ======================
   GITHUB AUTH
====================== */

async function login(){
  await sb.auth.signInWithOAuth({
    provider:"github",
    options:{
      redirectTo: window.location.origin
    }
  });
}

async function getAuthUser(){
  const { data } = await sb.auth.getUser();
  return data.user;
}

/* ======================
   PROFILE SYSTEM
====================== */

async function ensureProfile(authUser){
  const username = authUser.user_metadata.user_name;
  const avatar = authUser.user_metadata.avatar_url;

  let { data } = await sb
    .from("sns_profiles")
    .select("*")
    .eq("username",username)
    .single();

  if(!data){
    await sb.from("sns_profiles").insert({
      username,
      display_name: username,
      avatar_url: avatar
    });
  }
}

/* ======================
   GET PROFILE
====================== */

async function getProfile(username){
  const { data } = await sb
    .from("sns_profiles")
    .select("*")
    .eq("username",username)
    .single();

  return data;
}

/* ======================
   ONBOARDING
====================== */

function onboarding(profile){
  document.getElementById("app").innerHTML=`
    <div class="modal">
      <div class="modal-box">

        <h2>Finish setup</h2>

        <p><b>@${profile.username}</b></p>

        <input id="name" value="${profile.display_name}" />
        <input id="avatar" value="${profile.avatar_url}" />

        <button onclick="save('${profile.username}')">
          Continue
        </button>

      </div>
    </div>
  `;
}

async function save(username){
  const name = document.getElementById("name").value;
  const avatar = document.getElementById("avatar").value;

  await sb
    .from("sns_profiles")
    .update({
      display_name:name,
      avatar_url:avatar
    })
    .eq("username",username);

  init();
}

/* ======================
   POSTS
====================== */

async function loadFeed(){
  const { data } = await sb
    .from("sns_posts")
    .select("*, sns_profiles(username, display_name, avatar_url)")
    .order("created_at",{ascending:false});

  render(data);
}

async function post(){
  const auth = await getAuthUser();
  const content = document.getElementById("postbox").value;

  const { data: profile } = await sb
    .from("sns_profiles")
    .select("*")
    .eq("username",auth.user_metadata.user_name)
    .single();

  await sb.from("sns_posts").insert({
    user_id:profile.id,
    content
  });

  loadFeed();
}

/* ======================
   FOLLOW
====================== */

async function follow(targetId){
  const auth = await getAuthUser();

  const { data: me } = await sb
    .from("sns_profiles")
    .select("*")
    .eq("username",auth.user_metadata.user_name)
    .single();

  await sb.from("sns_follows").insert({
    follower_id:me.id,
    following_id:targetId
  });
}

/* ======================
   UI
====================== */

function render(posts){
  document.getElementById("app").innerHTML=`
  <div class="layout">

    <div class="left">
      <div class="logo">🐦 CodeSNS</div>
      <button onclick="login()">Login with GitHub</button>
      <p>Home</p>
      <p>Explore</p>
    </div>

    <div class="center">

      <div class="card">
        <textarea id="postbox" placeholder="What’s happening?"></textarea>
        <button onclick="post()">Post</button>
      </div>

      ${posts.map(p=>`
        <div class="card">

          <div class="post-header">
            <img class="avatar" src="${p.sns_profiles.avatar_url}">
            <div>
              <div class="name">${p.sns_profiles.display_name}</div>
              <div class="handle">@${p.sns_profiles.username}</div>
            </div>
          </div>

          <p>${p.content}</p>

          <button onclick="follow('${p.user_id}')">Follow</button>

        </div>
      `).join("")}

    </div>

    <div class="right">
      <div class="card">
        <h3>Trends</h3>
        <p>#buildinpublic</p>
        <p>#githubdevs</p>
      </div>
    </div>

  </div>
  `;
}

/* ======================
   INIT FLOW
====================== */

async function init(){
  const auth = await getAuthUser();

  if(!auth){
    document.getElementById("app").innerHTML=`
      <div class="modal">
        <div class="modal-box">
          <h2>CodeSNS</h2>
          <button onclick="login()">Login with GitHub</button>
        </div>
      </div>
    `;
    return;
  }

  await ensureProfile(auth);

  const profile = await getProfile(auth.user_metadata.user_name);

  if(!profile.display_name){
    onboarding(profile);
    return;
  }

  loadFeed();
}

init();
</script>

</body>
</html>
