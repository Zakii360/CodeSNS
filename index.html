<!DOCTYPE html>
<html>
<head>
<title>CodeSNS</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f14;
  color:#e6edf3;
}

.center{
  max-width:650px;
  margin:auto;
}

.card{
  background:#0f1620;
  border:1px solid #1f2a37;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

textarea,input{
  width:100%;
  padding:10px;
  background:#0f1620;
  border:1px solid #2a3a4d;
  color:white;
  border-radius:10px;
}

button{
  background:#2563eb;
  border:none;
  padding:8px 12px;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

.post-header{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
}

.name{
  font-weight:700;
}

.handle{
  color:#7aa2ff;
  font-size:12px;
}

a{color:inherit;text-decoration:none;}
</style>

</head>

<body>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const sb = supabase.createClient(
  "https://tvxugmumfvgnvjacwwfz.supabase.co",
  "PASTE_ANON_KEY"
);

/* =========================
   AUTH (GITHUB AUTO)
========================= */

async function login(){
  await sb.auth.signInWithOAuth({
    provider:"github",
    options:{ redirectTo: window.location.origin }
  });
}

async function user(){
  const { data } = await sb.auth.getUser();
  return data.user;
}

/* =========================
   PROFILE AUTO CREATE
========================= */

async function ensureProfile(u){
  const username = u.user_metadata.user_name;
  const avatar = u.user_metadata.avatar_url;

  let { data } = await sb
    .from("sns_profiles")
    .select("*")
    .eq("id",u.id)
    .single();

  if(!data){
    await sb.from("sns_profiles").insert({
      id:u.id,
      username,
      display_name:username,
      avatar_url:avatar,
      onboarding_complete:false
    });
  }
}

/* =========================
   GET PROFILE
========================= */

async function getProfile(uid){
  let { data } = await sb
    .from("sns_profiles")
    .select("*")
    .eq("id",uid)
    .single();

  return data;
}

/* =========================
   ONBOARDING
========================= */

function onboarding(profile){
  document.getElementById("app").innerHTML=`
    <div class="center">
      <h2>Welcome to CodeSNS</h2>

      <div class="card">
        <p><b>@${profile.username}</b></p>

        <input id="name" value="${profile.display_name}" />
        <input id="avatar" value="${profile.avatar_url}" />

        <button onclick="finish('${profile.id}')">
          Finish Setup
        </button>
      </div>
    </div>
  `;
}

async function finish(id){
  const name = document.getElementById("name").value;
  const avatar = document.getElementById("avatar").value;

  await sb.from("sns_profiles")
    .update({
      display_name:name,
      avatar_url:avatar,
      onboarding_complete:true
    })
    .eq("id",id);

  init();
}

/* =========================
   FEED
========================= */

async function loadFeed(){
  const { data } = await sb
    .from("sns_posts")
    .select("*, sns_profiles(username, display_name, avatar_url)")
    .order("created_at",{ascending:false});

  document.getElementById("app").innerHTML=`
    <div class="center">

      <div class="card">
        <textarea id="postbox" placeholder="What are you building?"></textarea>
        <button onclick="post()">Post</button>
      </div>

      ${data.map(p=>`
        <div class="card">
          <div class="post-header">
            <img class="avatar" src="${p.sns_profiles.avatar_url}">
            <div>
              <div class="name">${p.sns_profiles.display_name}</div>
              <div class="handle">@${p.sns_profiles.username}</div>
            </div>
          </div>

          <p>${p.content}</p>
        </div>
      `).join("")}

    </div>
  `;
}

async function post(){
  const u = await user();
  const content = document.getElementById("postbox").value;

  await sb.from("sns_posts").insert({
    user_id:u.id,
    content
  });

  loadFeed();
}

/* =========================
   INIT FLOW
========================= */

async function init(){
  const u = await user();

  if(!u){
    document.getElementById("app").innerHTML=`
      <div class="center" style="text-align:center;margin-top:100px;">
        <h1>CodeSNS</h1>
        <button onclick="login()">Login with GitHub</button>
      </div>
    `;
    return;
  }

  await ensureProfile(u);
  const profile = await getProfile(u.id);

  if(!profile.onboarding_complete){
    onboarding(profile);
    return;
  }

  loadFeed();
}

init();
</script>

</body>
</html>
