<!DOCTYPE html>
<html>
<head>
<title>CodeSNS</title>

<style>
body {
  margin:0;
  font-family: monospace;
  background:#0b0f14;
  color:#d6e1ff;
}

header {
  padding:14px;
  border-bottom:1px solid #1c2633;
  display:flex;
  justify-content:space-between;
}

.container {
  display:flex;
  max-width:1000px;
  margin:auto;
}

.sidebar {
  width:220px;
  border-right:1px solid #1c2633;
  padding:10px;
}

.feed {
  flex:1;
  padding:10px;
}

.post {
  border:1px solid #1c2633;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

textarea,input {
  width:100%;
  padding:8px;
  margin-bottom:8px;
  background:#0f1620;
  border:1px solid #243244;
  color:white;
}

button {
  background:#3b82f6;
  border:none;
  padding:8px 12px;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

.avatar {
  width:40px;
  height:40px;
  border-radius:50%;
}

.big {
  width:80px;
  height:80px;
}

.handle {
  color:#7aa2ff;
  font-size:12px;
}
</style>

</head>

<body>

<header>
  <div>🐦 CodeSNS</div>
  <div id="user"></div>
</header>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://tvxugmumfvgnvjacwwfz.supabase.co";
const SUPABASE_ANON_KEY = "PASTE_KEY_HERE";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =========================
   AUTH
========================= */

async function login() {
  await sb.auth.signInWithOAuth({
    provider:"github",
    options:{ redirectTo: window.location.origin }
  });
}

async function getUser() {
  const { data } = await sb.auth.getUser();
  return data.user;
}

/* =========================
   PROFILE
========================= */

async function getProfile(user) {
  const { data } = await sb
    .from("sns_profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  return data;
}

async function createProfile(user) {
  await sb.from("sns_profiles").insert({
    id: user.id,
    username: user.user_metadata.user_name,
    display_name: user.user_metadata.user_name,
    avatar_url: user.user_metadata.avatar_url,
    onboarding_complete: false
  });
}

async function completeOnboarding(userId) {
  const name = document.getElementById("name").value;
  const avatar = document.getElementById("avatar").value;

  await sb.from("sns_profiles")
    .update({
      display_name: name,
      avatar_url: avatar,
      onboarding_complete: true
    })
    .eq("id", userId);

  init();
}

/* =========================
   ONBOARDING UI
========================= */

function onboarding(user) {
  document.getElementById("app").innerHTML = `
    <div style="max-width:500px;margin:60px auto;">
      <h2>Welcome to CodeSNS</h2>

      <p>GitHub: @${user.user_metadata.user_name}</p>

      <input id="name" placeholder="Display name (e.g. Linus)" />
      <input id="avatar" value="${user.user_metadata.avatar_url}" placeholder="Avatar URL" />

      <button onclick="completeOnboarding('${user.id}')">
        Finish Setup
      </button>
    </div>
  `;
}

/* =========================
   FEED
========================= */

async function loadFeed(user) {
  const { data } = await sb
    .from("sns_posts")
    .select("*, sns_profiles(username, display_name, avatar_url)")
    .order("created_at", { ascending:false });

  document.getElementById("app").innerHTML = `
    <div class="container">

      <div class="sidebar">
        <p>Feed</p>
        <p>Profile</p>
      </div>

      <div class="feed">

        <div>
          <textarea id="content" placeholder="Share a build..."></textarea>
          <button onclick="post('${user.id}')">Post</button>
        </div>

        ${data.map(p => `
          <div class="post">
            <div style="display:flex;gap:10px;align-items:center;">
              <img class="avatar" src="${p.sns_profiles.avatar_url}" />
              <div>
                <b>${p.sns_profiles.display_name}</b><br>
                <span class="handle">@${p.sns_profiles.username}</span>
              </div>
            </div>

            <p>${p.content}</p>
          </div>
        `).join("")}

      </div>
    </div>
  `;
}

/* =========================
   POST
========================= */

async function post(userId) {
  const content = document.getElementById("content").value;

  await sb.from("sns_posts").insert({
    user_id: userId,
    content
  });

  init();
}

/* =========================
   INIT FLOW
========================= */

async function init() {
  const user = await getUser();

  if (!user) {
    document.getElementById("app").innerHTML = `
      <div style="text-align:center;margin-top:80px;">
        <h2>CodeSNS</h2>
        <button onclick="login()">Login with GitHub</button>
      </div>
    `;
    return;
  }

  let profile = await getProfile(user);

  if (!profile) {
    await createProfile(user);
    profile = await getProfile(user);
  }

  document.getElementById("user").innerText = "@" + profile.username;

  if (!profile.onboarding_complete) {
    onboarding(user);
    return;
  }

  loadFeed(user);
}

init();
</script>

</body>
</html>
